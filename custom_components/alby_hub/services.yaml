create_invoice:
  name: Create Lightning invoice
  description: >
    Create a Lightning BOLT11 invoice via local Alby Hub API (expert mode).
    Provide exactly one of amount_sat, amount_btc, or amount_fiat+fiat_currency.
    The created invoice is stored in the sensor.alby_hub_last_invoice entity (bolt11 attribute) for display.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    amount_sat:
      required: false
      description: Invoice amount in satoshis.
      selector:
        number:
          min: 1
          mode: box
          step: 1
    amount_btc:
      required: false
      description: Invoice amount in BTC (converted to satoshis automatically).
      selector:
        number:
          min: 0
          mode: box
    amount_fiat:
      required: false
      description: Invoice amount in fiat currency (requires fiat_currency). Converted using the current Bitcoin price sensor.
      selector:
        number:
          min: 0
          step: 0.01
          mode: box
    fiat_currency:
      required: false
      description: Fiat currency code for amount_fiat conversion (e.g. EUR, USD).
      selector:
        text:
    memo:
      required: false
      description: Optional description shown on the invoice.
      selector:
        text:
    expiry_seconds:
      required: false
      description: Optional invoice expiry time in seconds.
      selector:
        number:
          min: 1
          mode: box
          step: 1
send_payment:
  name: Send Lightning payment
  description: >
    Send a BOLT11 payment via local Alby Hub API (expert mode).
    If payment_request is omitted, the value from text.alby_hub_invoice_input is used automatically.
    After successful payment the invoice_input entity is cleared.
    For Lightning address payments (user@domain.com), provide amount_sat, amount_btc, or amount_fiat.
    Alternatively, use recipient_entity to select a contact directly from the address book.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    payment_request:
      required: false
      description: BOLT11 payment request string or Lightning address. If omitted, read from invoice_input text entity.
      selector:
        text:
    recipient_entity:
      required: false
      description: >
        Optional: select a Lightning contact entity from the address book
        (e.g. select.alby_hub_lightning_contact). The entity's current state
        (or its 'address' attribute) is used as the payment target.
        Takes precedence over payment_request when provided.
      selector:
        entity:
          domain: select
    amount_sat:
      required: false
      description: Amount in satoshis (for Lightning address payments).
      selector:
        number:
          min: 1
          mode: box
          step: 1
    amount_btc:
      required: false
      description: Amount in BTC (for Lightning address payments).
      selector:
        number:
          min: 0
          mode: box
    amount_fiat:
      required: false
      description: Amount in fiat currency (for Lightning address payments). Requires fiat_currency.
      selector:
        number:
          min: 0
          step: 0.01
          mode: box
    fiat_currency:
      required: false
      description: Fiat currency code for amount_fiat (e.g. EUR, USD).
      selector:
        text:
    memo:
      required: false
      description: Optional payment purpose/description.
      selector:
        text:
list_transactions:
  name: List transactions
  description: >
    Retrieve recent Lightning payment history (incoming and outgoing).
    Returns a list of normalized transaction objects.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    limit:
      required: false
      description: Maximum number of transactions to return (default 50, max 500).
      selector:
        number:
          min: 1
          max: 500
          mode: box
          step: 1
schedule_payment:
  name: Schedule recurring payment
  description: >
    Create a recurring Lightning payment that fires automatically on the configured schedule.
    The recipient must be a BOLT11 invoice (static) or Lightning address.
    Supports daily, weekly, monthly, and quarterly intervals with configurable
    start and end dates.
    Alternatively, use recipient_entity to select a contact directly from the address book.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    recipient:
      required: false
      description: >
        BOLT11 invoice string or Lightning address (user@domain.com) to pay.
        Required when recipient_entity is not provided.
      selector:
        text:
    recipient_entity:
      required: false
      description: >
        Optional: select a Lightning contact entity from the address book
        (e.g. select.alby_hub_lightning_contact). The entity's current state
        (or its 'address' attribute) is used as the recipient.
        Takes precedence over the recipient field when provided.
      selector:
        entity:
          domain: select
    amount_sat:
      required: true
      description: Amount in satoshis to send on each occurrence.
      selector:
        number:
          min: 1
          mode: box
          step: 1
    label:
      required: false
      description: Human-readable name for this schedule (e.g. "Taschengeld Lisa").
      selector:
        text:
    memo:
      required: false
      description: Optional payment description attached to each payment.
      selector:
        text:
    frequency:
      required: true
      description: "How often to repeat: daily, weekly, monthly, or quarterly."
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
            - quarterly
    hour:
      required: false
      description: Hour of day to execute (0–23, default 8).
      selector:
        number:
          min: 0
          max: 23
          mode: box
          step: 1
    minute:
      required: false
      description: Minute of hour to execute (0–59, default 0).
      selector:
        number:
          min: 0
          max: 59
          mode: box
          step: 1
    day_of_week:
      required: false
      description: Day of week for weekly frequency (0=Monday … 6=Sunday, default 0).
      selector:
        number:
          min: 0
          max: 6
          mode: box
          step: 1
    day_of_month:
      required: false
      description: Day of month for monthly/quarterly frequency (1–28, default 1).
      selector:
        number:
          min: 1
          max: 28
          mode: box
          step: 1
    start_date:
      required: false
      description: >
        First allowed fire date in ISO format YYYY-MM-DD (default: today).
      selector:
        text:
    end_date:
      required: false
      description: >
        Last allowed fire date in ISO format YYYY-MM-DD (optional, leave blank for no end).
      selector:
        text:
list_scheduled_payments:
  name: List scheduled payments
  description: >
    Return all recurring payment schedules configured for this Alby Hub instance.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
delete_scheduled_payment:
  name: Delete scheduled payment
  description: >
    Cancel and permanently remove a recurring payment schedule by its unique ID.
    Use list_scheduled_payments to find the schedule ID.
  fields:
    schedule_id:
      required: true
      description: Unique ID of the schedule to delete (UUID string).
      selector:
        text:
update_scheduled_payment:
  name: Update scheduled payment
  description: >
    Update fields of an existing recurring payment schedule by schedule_id.
    Only provided fields are changed.
  fields:
    schedule_id:
      required: true
      description: Unique ID of the schedule to update (UUID string).
      selector:
        text:
    recipient:
      required: false
      description: New recipient (BOLT11 or Lightning address).
      selector:
        text:
    recipient_entity:
      required: false
      description: >
        Optional: select a Lightning contact entity from the address book
        (e.g. select.alby_hub_lightning_contact) to update the recipient.
        Takes precedence over the recipient field when provided.
      selector:
        entity:
          domain: select
    amount_sat:
      required: false
      description: New amount in satoshis.
      selector:
        number:
          min: 1
          mode: box
          step: 1
    label:
      required: false
      description: New label.
      selector:
        text:
    memo:
      required: false
      description: New payment memo.
      selector:
        text:
    frequency:
      required: false
      description: New recurrence frequency.
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
            - quarterly
    hour:
      required: false
      description: New hour of day (0-23).
      selector:
        number:
          min: 0
          max: 23
          mode: box
          step: 1
    minute:
      required: false
      description: New minute of hour (0-59).
      selector:
        number:
          min: 0
          max: 59
          mode: box
          step: 1
    day_of_week:
      required: false
      description: New day of week for weekly frequency (0-6).
      selector:
        number:
          min: 0
          max: 6
          mode: box
          step: 1
    day_of_month:
      required: false
      description: New day of month for monthly/quarterly (1-28).
      selector:
        number:
          min: 1
          max: 28
          mode: box
          step: 1
    start_date:
      required: false
      description: New start date (YYYY-MM-DD).
      selector:
        text:
    end_date:
      required: false
      description: New end date (YYYY-MM-DD). Leave empty for no end.
      selector:
        text:
    enabled:
      required: false
      description: Enable or disable this schedule.
      selector:
        boolean:
run_scheduled_payment_now:
  name: Run scheduled payment now
  description: >
    Execute a configured schedule immediately and keep it active for future runs.
  fields:
    schedule_id:
      required: true
      description: Unique ID of the schedule to run now (UUID string).
      selector:
        text:
nostr_send_bot_message:
  name: "Nostr bot: send encrypted message"
  description: >
    Sends a direct message from the configured bot key to a whitelisted npub.
    The encryption method (NIP-04, NIP-44, both, or plaintext) is determined by
    the 'nostr_encryption_mode' setting configured in the integration options.
    NIP-04 (default) offers maximum compatibility with Damus, Primal, WhiteNoise, and Oxchat.
    Alternatively, use target_entity to select a Nostr contact from the address book.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    target_npub:
      required: false
      description: Recipient npub (must be in whitelist). Required when target_entity is not provided.
      selector:
        text:
    target_entity:
      required: false
      description: >
        Optional: select a Nostr contact entity from the address book
        (e.g. select.alby_hub_nostr_contact). The entity's current state
        (or its 'address' attribute) is used as the target npub.
        Takes precedence over target_npub when provided.
      selector:
        entity:
          domain: select
    message:
      required: true
      description: Message text to send.
      selector:
        text:
nostr_send_test_message:
  name: "Nostr test: send message via custom nsec"
  description: >
    Sends a NIP-44 encrypted test direct message from the provided nsec to the configured bot npub.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    nsec:
      required: true
      description: Private key for test account (nsec or 64-char hex).
      selector:
        text:
    message:
      required: true
      description: Message text to send.
      selector:
        text:
nostr_list_messages:
  name: "Nostr bot: list messages/status"
  description: >
    Returns current Nostr bot status and recent inbound/outbound webhook and DM messages.
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    limit:
      required: false
      description: Maximum number of messages to return (default 100, max 250).
      selector:
        number:
          min: 1
          max: 250
          mode: box
          step: 1
address_book_list_contacts:
  name: "Address book: list contacts"
  description: >
    Returns all address book contacts sorted by last name and first name.

address_book_get_contact:
  name: "Address book: get contact"
  description: >
    Returns a single address book contact by its unique ID.
  fields:
    contact_id:
      required: true
      description: Unique contact ID (UUID string).
      selector:
        text:

address_book_create_contact:
  name: "Address book: create contact"
  description: >
    Create a new address book contact. At least one of last_name or first_name should be provided.
  fields:
    last_name:
      required: false
      description: Family name (Nachname).
      selector:
        text:
    first_name:
      required: false
      description: Given name (Vorname).
      selector:
        text:
    nostr_alias:
      required: false
      description: Human-readable Nostr handle / alias (e.g. alice@nostr.com).
      selector:
        text:
    nostr_pubkey:
      required: false
      description: Nostr public key (npub… or 64-char hex).
      selector:
        text:
    lightning_address:
      required: false
      description: Lightning address (e.g. alice@wallet.com).
      selector:
        text:
    bitcoin_address:
      required: false
      description: On-chain Bitcoin address (bc1…, 1…, 3…).
      selector:
        text:
    notes:
      required: false
      description: Free-text notes about this contact.
      selector:
        text:
    tags:
      required: false
      description: List of tag strings for grouping contacts.
      selector:
        text:

address_book_update_contact:
  name: "Address book: update contact"
  description: >
    Update one or more fields of an existing address book contact.
    Only the provided fields are changed.
  fields:
    contact_id:
      required: true
      description: Unique contact ID (UUID string).
      selector:
        text:
    last_name:
      required: false
      description: New family name.
      selector:
        text:
    first_name:
      required: false
      description: New given name.
      selector:
        text:
    nostr_alias:
      required: false
      description: New Nostr alias.
      selector:
        text:
    nostr_pubkey:
      required: false
      description: New Nostr public key (npub or 64-char hex).
      selector:
        text:
    lightning_address:
      required: false
      description: New Lightning address.
      selector:
        text:
    bitcoin_address:
      required: false
      description: New Bitcoin on-chain address.
      selector:
        text:
    notes:
      required: false
      description: New free-text notes.
      selector:
        text:
    tags:
      required: false
      description: New list of tag strings.
      selector:
        text:

address_book_delete_contact:
  name: "Address book: delete contact"
  description: >
    Permanently delete an address book contact by its unique ID.
  fields:
    contact_id:
      required: true
      description: Unique contact ID (UUID string).
      selector:
        text:
