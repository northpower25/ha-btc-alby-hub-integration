create_invoice:
  name: Create Lightning invoice
  description: Create a Lightning invoice via local Alby Hub API (expert mode).
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    amount_sat:
      required: true
      description: Invoice amount in satoshis.
      selector:
        number:
          min: 1
          mode: box
          step: 1
    memo:
      required: false
      description: Optional description shown on the invoice.
      selector:
        text:
    expiry_seconds:
      required: false
      description: Optional invoice expiry time in seconds.
      selector:
        number:
          min: 1
          mode: box
          step: 1
send_payment:
  name: Send Lightning payment
  description: Send a BOLT11 payment request via local Alby Hub API (expert mode).
  fields:
    config_entry_id:
      required: false
      description: Optional config entry ID if multiple Alby Hub entries exist.
      selector:
        text:
    payment_request:
      required: true
      description: BOLT11 payment request string.
      selector:
        text:
