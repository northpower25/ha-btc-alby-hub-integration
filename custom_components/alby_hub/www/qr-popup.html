<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alby Hub QR Scanner</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #111;
      color: #fff;
    }
    .wrap {
      padding: 12px;
      max-width: 640px;
      margin: 0 auto;
    }
    #reader {
      width: 100%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      min-height: 240px;
    }
    .msg {
      margin: 10px 0 0;
      font-size: 0.9rem;
      color: #c9c9c9;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 120px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h3 style="margin:0 0 10px">📷 QR Scanner</h3>
    <div id="reader"></div>
    <p id="status" class="msg">Initializing scanner…</p>
    <div class="actions">
      <button id="stop-btn" type="button">Stop</button>
      <button id="close-btn" type="button">Close</button>
    </div>
  </div>
  <script src="./qr-popup.js"></script>
</body>
</html>
